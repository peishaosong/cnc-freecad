name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test-macos:
    runs-on: macos-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python (FreeCAD bundled)
        run: |
          # macos runners don't have FreeCAD pre-installed
          brew install --cask freecad

          FREECAD_PYTHON="/Applications/FreeCAD.app/Contents/Resources/bin/python"
          echo "FREECAD_PYTHON=$FREECAD_PYTHON" >> $GITHUB_ENV

      - name: Install project dependencies
        run: |
          # Pydantic v2 must be installed into FreeCAD's bundled Python
          ${{ env.FREECAD_PYTHON }} -m pip install pydantic

      - name: Run environment verification (verify_env.sh)
        run: ./scripts/verify_env.sh

      - name: Run unit tests (M0)
        run: |
          /Applications/FreeCAD.app/Contents/Resources/bin/freecadcmd -c "
          import sys
          sys.path.insert(0, '.')
          from tests.test_env import run_all
          sys.exit(run_all())
          "
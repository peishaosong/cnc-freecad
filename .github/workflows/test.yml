name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test-macos:
    runs-on: macos-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install FreeCAD
        run: brew install --cask freecad

      - name: Install pydantic into FreeCAD Python
        run: /Applications/FreeCAD.app/Contents/Resources/bin/python -m pip install pydantic

      - name: M0 - Environment verification
        run: |
          /Applications/FreeCAD.app/Contents/Resources/bin/freecadcmd -P $PWD/src -c "
          import sys
          sys.path.insert(0, '.')
          from tests.test_env import run_all
          sys.exit(run_all())
          "

      - name: M1 - Toolpath end-to-end
        run: |
          /Applications/FreeCAD.app/Contents/Resources/bin/freecadcmd -P $PWD/src -c "
          import sys
          sys.path.insert(0, '.')
          from tests.test_m1_toolpath import run_all
          sys.exit(run_all())
          "

      - name: M1 - UI integration
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          QT_QPA_PLATFORM=offscreen \
            /Applications/FreeCAD.app/Contents/Resources/bin/freecadcmd -P $PWD/src -c "
            import sys
            sys.path.insert(0, '.')
            from tests.test_m1_ui import run_all
            sys.exit(run_all())
            "

      - name: CLI smoke test
        run: |
          PYTHONPATH=$PWD/src \
            /Applications/FreeCAD.app/Contents/Resources/bin/python \
            -m cnc_freecad info
          PYTHONPATH=$PWD/src \
            /Applications/FreeCAD.app/Contents/Resources/bin/python \
            -m cnc_freecad run-pocket \
              --width 60 --depth 40 --pocket-depth 8 \
              --output /tmp/cli_test.nc
          test -f /tmp/cli_test.nc
          wc -c /tmp/cli_test.nc